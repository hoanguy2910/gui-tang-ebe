<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi ebe cụa tuiii💕</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffc0cb,#ffb6d5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CONTAINER */
.container{
    width:900px;
    height:520px;
    background:#fff0f5;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(255,105,180,0.4);
    padding:30px;
    position:relative;
    overflow:hidden;
}

.hidden{display:none}

/* ================= LOGIN ================= */
#login{
    display:flex;
    justify-content:space-between;
    align-items:center;
    height:100%;
}

.login-left{
    width:45%;
    display:flex;
    justify-content:center;
}

.login-left img{
    width:100%;
    max-width:350px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.login-right{
    width:50%;
    text-align:center;
}

.password-dots{
    font-size:28px;
    letter-spacing:10px;
    margin:15px 0;
}

.pin{
    display:grid;
    grid-template-columns:repeat(3,70px);
    gap:15px;
    justify-content:center;
}

.pin button{
    height:60px;
    width:60px;
    border-radius:50%;
    border:none;
    font-size:20px;
    background:#ffd6e7;
    cursor:pointer;
    transition:0.3s;
}

.pin button:hover{
    background:#ff9ecb;
    transform:scale(1.1);
}

/* ================= MENU ================= */
.menu{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    margin-top:80px;
}

.menu button{
    padding:30px;
    font-size:18px;
    border:none;
    border-radius:20px;
    background:#ffe4f0;
    cursor:pointer;
    transition:0.3s;
}

.menu button:hover{
    background:#ffb6d5;
    transform:scale(1.05);
}

/* CLOSE BUTTON */
.close{
    position:absolute;
    top:20px;
    right:25px;
    background:#ff69b4;
    color:white;
    width:35px;
    height:35px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-weight:bold;
}

/* ================= MUSIC ================= */
.song{
    padding:10px;
    margin:10px;
    background:#fff;
    border-radius:10px;
    cursor:pointer;
}

/* ================= LETTER ================= */
.letter{
    padding:20px;
    background:#fff;
    border-radius:15px;
    margin-top:20px;
}

/* ================= IMAGE SLIDER ================= */
.slider{
    position:relative;
    height:320px;
    overflow:hidden;
    margin-top:20px;
}

.row{
    display:flex;
    position:absolute;
    width:200%;
    gap:30px;              /* khoảng cách giữa các ảnh */
}

.row img{
    width:140px;
    height:140px;
    border-radius:18px;
    object-fit:cover;
}

/* 2 hàng cách nhau 40px */
.row1{
    top:20px;
    animation:slide1 25s linear infinite;
}

.row2{
    top:180px;             /* 140px ảnh + 40px khoảng cách */
    animation:slide2 25s linear infinite;
}

@keyframes slide1{
    from{left:0}
    to{left:-100%}
}
@keyframes slide2{
    from{left:-100%}
    to{left:0}
}

/* ================= GIFT ================= */
.flower{
    position:absolute;
    bottom:-200px;
    left:50%;
    transform:translateX(-50%);
    width:150px;
    animation:grow 3s forwards;
}

@keyframes grow{
    to{bottom:120px;}
}

.wish{
    position:absolute;
    bottom:60px;
    width:100%;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    color:#ff1493;
}

.falling{
    position:absolute;
    width:70px;
    animation:fall 7s linear forwards;
    pointer-events:none;
}

@keyframes fall{
    from{
        top:-120px;
        opacity:1;
        transform:rotate(0deg);
    }
    to{
        top:650px;
        opacity:0;
        transform:rotate(360deg);
    }
}

.falling-text{
    position:absolute;
    font-size:14px;
    color:#ff1493;
    font-weight:bold;
    animation:fall 6s linear forwards;
}


</style>
</head>

<body>
<div class="container">

<!-- LOGIN -->
<div id="login">

    <div class="login-left">
        <img src="8-3/1 (4).jpg">
    </div>

    <div class="login-right">
        <h2>Nhập mật khẩu 💖</h2>
        <div id="display" class="password-dots"></div>
        <div class="pin" id="pin"></div>
    </div>

</div>

<!-- MENU -->
<div id="main" class="hidden">
    <div class="menu">
        <button onclick="openMusic()">🎵 Nhạc</button>
        <button onclick="openLetter()">💌 Thư</button>
        <button onclick="openImage()">💟 Ảnh</button>
        <button onclick="openGift()">🎁 Gift</button>
    </div>
</div>

<!-- CONTENT -->
<div id="content" class="hidden"></div>

</div>

<script>
let password="972005";
let input="";

let pin=document.getElementById("pin");

for(let i=1;i<=9;i++){
    let btn=document.createElement("button");
    btn.innerText=i;
    btn.onclick=()=>press(i);
    pin.appendChild(btn);
}

let zero=document.createElement("button");
zero.innerText=0;
zero.onclick=()=>press(0);
pin.appendChild(zero);

function press(num){
    if(input.length < 6){
        input += num;
        document.getElementById("display").innerText = "●".repeat(input.length);
    }

    if(input.length === 6){
        if(input === password){

            input = "";
            document.getElementById("display").innerText = "";

            // Ẩn login
            document.getElementById("login").style.display = "none";

            // Hiện menu
            document.getElementById("main").classList.remove("hidden");

        }else{
            alert("Sai mật khẩu!");
            input = "";
            document.getElementById("display").innerText = "";
        }
    }
}

function goBack(){
    document.getElementById("content").classList.add("hidden");
    document.getElementById("main").classList.remove("hidden");
}

/* MUSIC */
function openMusic(){
    show(`
        <div class="close" onclick="goBack()">X</div>
        <h2>Danh sách nhạc 🎶</h2>
        <div class="song" onclick="play('8-3/Ánh Nắng Của Anh.mp3')">Ánh nắng của Anh</div>
        <div class="song" onclick="play('8-3/Có Chàng Trai Viết Lên Cây.mp3')">Có Chàng Trai Viết Lên Cây</div>
        <div class="song" onclick="play('8-3/Em Đồng Ý (I Do).mp3')">Em Đồng Ý (I Do)</div>
        <div class="song" onclick="play('8-3/Hơn Cả Yêu (Pro House).mp3')">Hơn Cả Yêu (Pro House)</div>
        <div class="song" onclick="play('8-3/Nàng Thơ.mp3')">Nàng Thơ</div>
        <div class="song" onclick="play('8-3/Yêu 5.mp3')">Yêu 5</div>
        <audio id="player" controls style="margin-top:20px;width:100%"></audio>
    `);
}
https://zingmp3.vn/bai-hat/Co-Chang-Trai-Viet-Len-Cay-Ha-Anh-Tuan/ZZ9IO8CI.html
function play(src){
    let p=document.getElementById("player");
    p.src=src;
    p.play();
}

/* LETTER */
function openLetter(){
    show(`
        <div class="close" onclick="goBack()">X</div>
        <h2>Lá thư gửi em 💖</h2>
        <div class="letter" style="max-height:320px;overflow:auto;line-height:1.6">

        Gửi em yêu thương ❤️<br><br>

        Có lẽ anh không phải là người giỏi nói những lời hoa mỹ,
        nhưng mỗi lời anh viết ra ở đây đều là thật lòng.
        Từ ngày em xuất hiện, cuộc sống của anh trở nên dịu dàng hơn,
        ấm áp hơn và đầy tiếng cười hơn.<br><br>

        Anh thích cách em cười, thích cách em quan tâm người khác,
        thích cả những lúc em giận dỗi đáng yêu.
        Em không hoàn hảo, và anh cũng vậy,
        nhưng khi ở bên nhau, mọi thứ đều trở nên vừa vặn.<br><br>

        Cảm ơn em vì đã kiên nhẫn với anh,
        cảm ơn em vì những lần nắm tay thật chặt,
        vì những tin nhắn chúc ngủ ngon,
        và vì đã chọn ở lại bên anh mỗi ngày.<br><br>

        Anh không hứa cho em cả thế giới,
        nhưng anh hứa sẽ cố gắng mỗi ngày
        để trở thành một người xứng đáng với tình cảm của em.<br><br>

        Nếu sau này có mệt mỏi,
        chỉ cần quay lại đây,
        đọc lại lá thư này,
        để nhớ rằng có một người luôn yêu em thật nhiều 💕<br><br>

        Thương em — hôm nay, ngày mai và rất nhiều ngày sau nữa.
        </div>
    `);
}

/* IMAGE */
function openImage(){
    show(`
        <div class="close" onclick="goBack()">X</div>
        <h2>Bộ ảnh của chúng ta 📸</h2>

        <div class="slider">
            <div class="row row1">
                <img src="8-3/1 (1).jpg">
                <img src="8-3/1 (2).jpg">
                <img src="8-3/1 (3).jpg">
                <img src="8-3/1 (5).jpg">
                <img src="8-3/1 (6).jpg">
            </div>

            <div class="row row2">
                <img src="8-3/1 (7).jpg">
                <img src="8-3/1 (8).jpg">
                <img src="8-3/1 (9).jpg">
                <img src="8-3/1 (10).jpg">
                <img src="8-3/1 (11).jpg">
            </div>
        </div>
    `);
}

/* GIFT */
let fallingInterval;

function openGift(){

    show(`
        <div class="close" onclick="stopGift()">X</div>

        <img class="flower" 
        src="8-3/2.gif">

        <div class="wish">
        Em là điều tuyệt vời nhất 🌸
        </div>
    `);

    startFalling();
}

function startFalling(){

    const images = [
        "8-3/1 (1).jpg",
        "8-3/1 (2).jpg",
        "8-3/1 (3).jpg",
        "8-3/1 (5).jpg",
        "8-3/1 (6).jpg",
        "8-3/1 (7).jpg",
        "8-3/1 (8).jpg",
        "8-3/1 (9).jpg",
        "8-3/1 (10).jpg",
        "8-3/1 (11).jpg"
    ];

    const wishes = [
        "Luôn vui nhé 💕",
        "Yêu em nhiều 💖",
        "Cười thật tươi 🌷",
        "Hạnh phúc nha 🌸",
        "Mãi bên nhau ✨"
    ];

    fallingInterval = setInterval(()=>{

        /* ẢNH RƠI */
        let img=document.createElement("img");
        img.src=images[Math.floor(Math.random()*images.length)];
        img.className="falling";
        img.style.left=Math.random()*850+"px";
        document.querySelector(".container").appendChild(img);

        setTimeout(()=>{ img.remove(); },7000);

        /* TEXT RƠI */
        let text=document.createElement("div");
        text.className="falling";
        text.style.fontSize="15px";
        text.style.color="#ff1493";
        text.style.fontWeight="bold";
        text.innerText=wishes[Math.floor(Math.random()*wishes.length)];
        text.style.left=Math.random()*850+"px";
        document.querySelector(".container").appendChild(text);

        setTimeout(()=>{ text.remove(); },7000);

    },500); // rơi dày hơn
}

function stopGift(){
    clearInterval(fallingInterval);
    goBack();
}

function show(html){
    document.getElementById("main").classList.add("hidden");

    let c = document.getElementById("content");
    c.innerHTML = html;
    c.classList.remove("hidden");
}
</script>

</body>

</html>
